<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nikita Krasilnikov</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050505;
      --surface: rgba(18, 20, 28, 0.65);
      --border: rgba(255, 255, 255, 0.08);
      --text: #a1a5b5;
      --text-strong: #ffffff;
      --hover: rgba(255, 255, 255, 0.05);
      --accent: #4f8ef7;
      --copper: #d9774b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .bg-animation {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .glow-copper {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--copper);
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      top: -10%;
      left: -10%;
      animation: floatCopper 12s ease-in-out infinite alternate;
    }

    .glow-blue {
      position: absolute;
      width: 450px;
      height: 450px;
      background: var(--accent);
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.12;
      bottom: -20%;
      right: -10%;
      animation: floatBlue 15s ease-in-out infinite alternate;
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
      opacity: 0.5;
    }

    @keyframes floatCopper {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(15%, 15%) scale(1.1); }
    }

    @keyframes floatBlue {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-10%, -15%) scale(1.15); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      color: var(--text-strong);
      font-size: 1.8rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .role {
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1rem 1.25rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .link-item:nth-child(1) { animation-delay: 0.1s; }
    .link-item:nth-child(2) { animation-delay: 0.15s; }
    .link-item:nth-child(3) { animation-delay: 0.2s; }
    .link-item:nth-child(4) { animation-delay: 0.25s; }

    .link-item:hover {
      background: var(--hover);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .link-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-strong);
      transition: color 0.3s ease;
    }

    .link-item:hover .link-icon {
      color: var(--accent);
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .link-icon .stroke-icon {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .link-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .link-title {
      color: var(--text-strong);
      font-weight: 500;
      font-size: 0.95rem;
    }

    .link-value {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arrow {
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--text-strong);
      font-size: 1.1rem;
    }

    .link-item:hover .arrow {
      opacity: 1;
      transform: translateX(0);
      color: var(--accent);
    }

    @media (max-width: 480px) {
      body { padding: 1rem; }
      .card { padding: 2.5rem 1.5rem; border-radius: 20px; }
      h1 { font-size: 1.6rem; }
      .role { font-size: 0.85rem; }
      .link-item { padding: 0.875rem 1rem; gap: 1rem; }
      .link-title { font-size: 0.9rem; }
    }
  </style>
</head>
